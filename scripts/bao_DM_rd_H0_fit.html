<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>BAO DESI DR1: D_M/r_d vs z | Фіт H₀ та Ωₘ</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0d12;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 16px 32px;
        }

        /* Зоряний фон */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* головна картка */
        .bao-card {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            width: 100%;
            background: rgba(18, 18, 30, 0.88);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            padding: 20px 20px 26px;
            transition: all 0.2s ease;
        }

        /* контейнер для канваса з адаптивним скролом */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 18px 0 8px;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            border-radius: 20px;
        }

        canvas {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
        }

        /* панель керування */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(255, 255, 255, 0.06);
            padding: 18px 18px 16px;
            border-radius: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(2px);
        }

        .ctrl-item {
            flex: 1;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            color: #e1dfd7;
        }

        .ctrl-label span:first-child {
            font-weight: 600;
            background: rgba(100, 100, 140, 0.25);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .value-badge {
            font-family: monospace;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 10px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e1dfd7;
        }

        input[type="range"] {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: #2c2c3a;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #f0b34b;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            border: 2px solid #1e1e2a;
        }

        /* інфо-панель */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 8px 0 10px;
            padding: 8px 4px;
        }

        .chi2-box {
            background: rgba(55, 138, 221, 0.2);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            color: #e8e6df !important;
        }

        .chi2-box strong {
            color: #e8e6df !important;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            row-gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.1s;
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }

        @media (max-width: 580px) {
            .badge {
                white-space: normal;
                word-break: keep-all;
                font-size: 0.75rem;
                padding: 5px 10px;
            }
            .stats-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .ctrl-item {
                min-width: 140px;
            }
            .control-panel {
                padding: 14px;
                gap: 16px;
            }
            .bao-card {
                padding: 16px;
            }
        }

        @media (max-width: 460px) {
            .ctrl-label span:first-child {
                font-size: 0.75rem;
            }
            .value-badge {
                font-size: 0.75rem;
            }
            .badge {
                font-size: 0.7rem;
            }
        }

        .badge.planck {
            background: rgba(55, 138, 221, 0.25);
            color: #7bb3e6;
            border-left: 3px solid #378ADD;
        }
        .badge.sh0es {
            background: rgba(226, 75, 74, 0.3);
            color: #ff8a7a;
            border-left: 3px solid #E24B4A;
        }
        .badge.best-fit {
            background: rgba(239, 159, 39, 0.28);
            color: #f6bd60;
            border-left: 3px solid #EF9F27;
        }

        hr {
            margin: 12px 0 0;
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .footnote {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
            color: #9e9caa;
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="bao-card">
    <h2 style="font-size: 1.4rem; font-weight: 600; margin: 0 0 6px 0; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; color: #e8e2d6;">
        📡 BAO DESI DR1
        <span style="font-size: 0.8rem; font-weight: normal; background: rgba(255,255,255,0.1); padding: 2px 12px; border-radius: 60px;">D<sub>M</sub>/r<sub>d</sub> + D<sub>V</sub>/r<sub>d</sub></span>
    </h2>

    <!-- панель повзунків -->
    <div class="control-panel">
        <div class="ctrl-item">
            <div class="ctrl-label">
                <span>🌌 H₀ (модель)</span>
                <span class="value-badge" id="h0val_display">67.4 км/с/Мпк</span>
            </div>
            <input type="range" id="h0slider" min="60" max="80" value="67.4" step="0.1" aria-label="H₀ parameter">
        </div>
        <div class="ctrl-item">
            <div class="ctrl-label">
                <span>⚫ Ω<sub>m</sub></span>
                <span class="value-badge" id="omval_display">0.315</span>
            </div>
            <input type="range" id="omslider" min="0.25" max="0.38" value="0.315" step="0.005" aria-label="Omega matter">
        </div>
    </div>

    <!-- статистика + бейджі -->
    <div class="stats-row">
        <div class="chi2-box">
            📐 МНК χ² : <strong id="chi2val">—</strong>
        </div>
        <div class="badge-group">
            <span class="badge planck" id="badge67">🔵 Planck: H₀ = 67.4</span>
            <span class="badge sh0es" id="badge73">🔴 SH0ES: H₀ = 73.0</span>
            <span class="badge best-fit" id="badgebest">🟠 МНК: —</span>
        </div>
    </div>

    <!-- canvas -->
    <div class="canvas-wrapper">
        <canvas id="baoCanvas" width="680" height="420" style="width:100%; height:auto; max-width:680px; aspect-ratio:680/420;"></canvas>
    </div>
    <div class="footnote">
        ⬤ D<sub>M</sub>/r<sub>d</sub> (DESI LRG, ELG, QSO, Lyα) &nbsp;|&nbsp; ◻ D<sub>V</sub>/r<sub>d</sub> (6dFGS, SDSS MGS, DESI BGS)<br>
        Теоретичні криві: Planck, SH0ES та підгоночна модель H₀ (жовтогаряча)
    </div>
</div>

<script>
    /* ── Starfield ── */
    (function () {
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let W, H, stars = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function seed() {
            stars = [];
            const n = Math.floor((W * H) / 2800);
            for (let i = 0; i < n; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.1 + 0.15,
                    a: Math.random(),
                    da: (Math.random() - 0.5) * 0.003
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, W, H);
            for (const s of stars) {
                s.a = Math.max(0.05, Math.min(1, s.a + s.da));
                if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220,210,195,${s.a * 0.7})`;
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }

        resize();
        seed();
        drawStars();
        window.addEventListener('resize', () => {
            resize();
            seed();
        });
    })();

    /* ── BAO Core ── */
    (function () {
        // Дані BAO (DESI DR1 + інші)
        const baoData = [
            { z: 0.106, DV_rd: 2.98,  eDV: 0.13,  type: 'DV', label: '6dFGS' },
            { z: 0.15,  DV_rd: 4.47,  eDV: 0.17,  type: 'DV', label: 'SDSS MGS' },
            { z: 0.30,  DV_rd: 7.93,  eDV: 0.15,  type: 'DV', label: 'DESI BGS' },
            { z: 0.51,  DM_rd: 13.62, eDM: 0.25,  type: 'DM', label: 'DESI LRG1' },
            { z: 0.71,  DM_rd: 16.85, eDM: 0.32,  type: 'DM', label: 'DESI LRG2' },
            { z: 0.93,  DM_rd: 21.71, eDM: 0.28,  type: 'DM', label: 'DESI LRG+ELG' },
            { z: 1.32,  DM_rd: 27.79, eDM: 0.69,  type: 'DM', label: 'DESI ELG' },
            { z: 1.49,  DM_rd: 30.21, eDM: 0.79,  type: 'DM', label: 'DESI QSO' },
            { z: 2.33,  DM_rd: 37.6,  eDM: 1.9,   type: 'DM', label: 'DESI Lyα' }
        ];

        const rd_fid = 147.09;
        const speedOfLight = 299792.458;

        function comovingDistanceOverRd(z, H0, OmegaM) {
            let integral = 0;
            const steps = 500;
            const dz = z / steps;
            for (let i = 0; i < steps; i++) {
                const z_mid = (i + 0.5) * dz;
                const E = Math.sqrt(OmegaM * Math.pow(1 + z_mid, 3) + (1 - OmegaM));
                integral += dz / E;
            }
            const DM_physical = (speedOfLight / H0) * integral;
            return DM_physical / rd_fid;
        }

        function dvOverRd(z, H0, OmegaM) {
            const DM_rd = comovingDistanceOverRd(z, H0, OmegaM);
            const DM_phys = DM_rd * rd_fid;
            const E = Math.sqrt(OmegaM * Math.pow(1 + z, 3) + (1 - OmegaM));
            const DH_phys = speedOfLight / (H0 * E);
            const DV_phys = Math.pow(z * DM_phys * DM_phys * DH_phys, 1/3);
            return DV_phys / rd_fid;
        }

        function computeChi2(H0, OmegaM) {
            let sum = 0;
            for (const pt of baoData) {
                let theory;
                if (pt.type === 'DM') {
                    theory = comovingDistanceOverRd(pt.z, H0, OmegaM);
                    sum += ((pt.DM_rd - theory) / pt.eDM) ** 2;
                } else {
                    theory = dvOverRd(pt.z, H0, OmegaM);
                    sum += ((pt.DV_rd - theory) / pt.eDV) ** 2;
                }
            }
            return sum;
        }

        function bestH0ForOmegaM(OmegaM, minH = 60, maxH = 80, step = 0.1) {
            let bestH = 67.4;
            let bestChi = Infinity;
            for (let h = minH; h <= maxH + step / 2; h += step) {
                const chi = computeChi2(h, OmegaM);
                if (chi < bestChi) {
                    bestChi = chi;
                    bestH = h;
                }
            }
            return bestH;
        }

        const canvas = document.getElementById('baoCanvas');
        const ctx = canvas.getContext('2d');
        const W = 680, H = 420;

        function setCanvasSize() {
            canvas.width = W;
            canvas.height = H;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            canvas.style.aspectRatio = '680/420';
        }

        function draw() {
            if (!ctx) return;
            const H0 = parseFloat(document.getElementById('h0slider').value);
            const Om = parseFloat(document.getElementById('omslider').value);

            document.getElementById('h0val_display').innerHTML = H0.toFixed(1) + ' км/с/Мпк';
            document.getElementById('omval_display').innerHTML = Om.toFixed(3);
            const chi2Val = computeChi2(H0, Om);
            document.getElementById('chi2val').innerHTML = chi2Val.toFixed(2);

            const bestH = bestH0ForOmegaM(Om);
            document.getElementById('badgebest').innerHTML = `🟠 МНК: H₀ = ${bestH.toFixed(1)}`;

            const isDark = true;
            const bgColor = '#12121e';
            const gridColor = 'rgba(255,255,255,0.08)';
            const axisColor = 'rgba(255,255,255,0.25)';
            const textColor = '#b7b5ab';
            const labelColor = 'rgba(210,208,200,0.7)';

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);

            const padL = 58, padR = 24, padT = 24, padB = 52;
            const gW = W - padL - padR;
            const gH = H - padT - padB;
            const zMax = 2.6;
            const yMax = 44;

            const tx = (z) => padL + gW * z / zMax;
            const ty = (y) => padT + gH * (1 - y / yMax);

            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= 6; i++) {
                const x = padL + gW * i / 6;
                ctx.beginPath();
                ctx.moveTo(x, padT);
                ctx.lineTo(x, padT + gH);
                ctx.stroke();
            }
            for (let i = 0; i <= 4; i++) {
                const y = padT + gH * i / 4;
                ctx.beginPath();
                ctx.moveTo(padL, y);
                ctx.lineTo(padL + gW, y);
                ctx.stroke();
            }

            function drawCurve(H0_val, OmegaM_val, color, dashPattern = []) {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.2;
                ctx.setLineDash(dashPattern);
                let first = true;
                for (let zi = 0.01; zi <= zMax; zi += 0.02) {
                    const yVal = comovingDistanceOverRd(zi, H0_val, OmegaM_val);
                    if (yVal > yMax + 1.5) break;
                    const xPx = tx(zi);
                    const yPx = ty(yVal);
                    if (first) {
                        ctx.moveTo(xPx, yPx);
                        first = false;
                    } else {
                        ctx.lineTo(xPx, yPx);
                    }
                }
                ctx.stroke();
                ctx.setLineDash([]);
            }

            drawCurve(67.4, Om, '#378ADD', []);
            drawCurve(73.0, Om, '#E24B4A', [6, 5]);
            drawCurve(H0, Om, '#EF9F27', []);

            ctx.strokeStyle = axisColor;
            ctx.lineWidth = 1;
            ctx.strokeRect(padL, padT, gW, gH);

            ctx.fillStyle = textColor;
            ctx.font = '11px system-ui, monospace';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 6; i++) {
                const zVal = (i / 6) * zMax;
                ctx.fillText(zVal.toFixed(1), tx(zVal), padT + gH + 16);
            }
            ctx.fillText('z (redshift)', padL + gW / 2, padT + gH + 36);

            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) {
                const yVal = Math.round(i / 4 * yMax);
                ctx.fillText(yVal, padL - 8, ty(yVal) + 4);
            }
            ctx.save();
            ctx.translate(18, padT + gH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.font = '11px system-ui';
            ctx.fillStyle = textColor;
            ctx.fillText('Dₘ / r_d  або  Dᵥ / r_d', 0, 0);
            ctx.restore();

            for (const pt of baoData) {
                const obs = pt.type === 'DM' ? pt.DM_rd : pt.DV_rd;
                const errVal = pt.type === 'DM' ? pt.eDM : pt.eDV;
                const xPx = tx(pt.z);
                const yPx = ty(obs);
                const errPx = gH * errVal / yMax;

                ctx.beginPath();
                ctx.strokeStyle = 'rgba(230,230,240,0.5)';
                ctx.lineWidth = 1.2;
                ctx.moveTo(xPx, yPx - errPx);
                ctx.lineTo(xPx, yPx + errPx);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(xPx - 4, yPx - errPx);
                ctx.lineTo(xPx + 4, yPx - errPx);
                ctx.moveTo(xPx - 4, yPx + errPx);
                ctx.lineTo(xPx + 4, yPx + errPx);
                ctx.stroke();

                const fillColor = pt.type === 'DM' ? '#1D9E75' : '#7F77DD';
                ctx.fillStyle = fillColor;
                if (pt.type === 'DM') {
                    ctx.beginPath();
                    ctx.arc(xPx, yPx, 5, 0, 2 * Math.PI);
                    ctx.fill();
                } else {
                    ctx.fillRect(xPx - 4.5, yPx - 4.5, 9, 9);
                }
                ctx.font = '9px system-ui';
                ctx.fillStyle = labelColor;
                ctx.textAlign = 'left';
                ctx.fillText(pt.label, xPx + 7, yPx + 3);
            }

            const legendX = padL + 8;
            let legendY = padT + 10;
            ctx.font = '11px system-ui';
            ctx.fillStyle = textColor;

            ctx.beginPath();
            ctx.strokeStyle = '#378ADD';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.moveTo(legendX, legendY + 5);
            ctx.lineTo(legendX + 24, legendY + 5);
            ctx.stroke();
            ctx.fillText('Planck H₀=67.4', legendX + 30, legendY + 9);

            ctx.beginPath();
            ctx.strokeStyle = '#E24B4A';
            ctx.setLineDash([6, 4]);
            ctx.moveTo(legendX + 165, legendY + 5);
            ctx.lineTo(legendX + 189, legendY + 5);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillText('SH0ES H₀=73.0', legendX + 195, legendY + 9);

            ctx.beginPath();
            ctx.strokeStyle = '#EF9F27';
            ctx.lineWidth = 2.2;
            ctx.moveTo(legendX + 320, legendY + 5);
            ctx.lineTo(legendX + 344, legendY + 5);
            ctx.stroke();
            ctx.fillText(`модель H₀=${H0.toFixed(1)}`, legendX + 350, legendY + 9);
            ctx.setLineDash([]);

            let legY2 = legendY + 24;
            ctx.fillStyle = '#1D9E75';
            ctx.beginPath();
            ctx.arc(legendX + 9, legY2 + 2, 5, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = textColor;
            ctx.fillText('Dₘ/r_d  (DESI LRG/ELG/QSO/Lyα)', legendX + 22, legY2 + 7);

            ctx.fillStyle = '#7F77DD';
            ctx.fillRect(legendX + 6, legY2 + 18, 8, 8);
            ctx.fillStyle = textColor;
            ctx.fillText('Dᵥ/r_d  (ізотропний BAO)', legendX + 22, legY2 + 27);

            ctx.font = '9px monospace';
            ctx.fillStyle = '#cfcba5';
            ctx.textAlign = 'right';
            ctx.fillText(`⨀ МНК (Ωₘ = ${Om.toFixed(3)}) → H₀ = ${bestH.toFixed(1)}`, W - 18, H - 12);
            ctx.textAlign = 'left';
        }

        document.getElementById('h0slider').addEventListener('input', draw);
        document.getElementById('omslider').addEventListener('input', draw);
        window.addEventListener('resize', () => draw());
        setCanvasSize();
        draw();
    })();
</script>

</body>
</html>
