
<style>
canvas { display: block; width: 100%; border-radius: 6px; }
.ctrl { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; color: var(--color-text-secondary); }
.ctrl input { flex: 1; max-width: 340px; }
.ctrl span { min-width: 32px; text-align: right; font-size: 13px; color: var(--color-text-primary); }
.row { display: flex; gap: 16px; margin-top: 10px; }
.panel { flex: 1; }
.cap { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 5px; }
</style>

<h2 class="sr-only">Хвиля в статичному і розширюваному просторі</h2>

<div class="ctrl">
  <span>Час</span>
  <input type="range" id="tSlider" min="0" max="100" value="30" step="1">
  <span id="tVal">30</span>
</div>

<div class="row">
  <div class="panel">
    <canvas id="flatCanvas" width="320" height="220"></canvas>
    <p class="cap">статичний простір — хвиля йде з c<sub>s</sub></p>
  </div>
  <div class="panel">
    <canvas id="expandCanvas" width="320" height="220"></canvas>
    <p class="cap">простір розширюється — хвиля + гума</p>
  </div>
</div>

<canvas id="graphCanvas" width="680" height="180" style="margin-top:14px; border-radius:6px;"></canvas>
<p style="font-size:12px; color:var(--color-text-secondary); text-align:center; margin-top:4px;">
  коморбідна відстань хвилі r<sub>s</sub>(t) — синя: статика, помаранчева: з розширенням
</p>

<script>
const W = 320, H = 220;
const GW = 680, GH = 180;
const cs = 1.0;

function a(t) {
  return Math.pow(1 + t * 0.018, 0.67);
}

function rFlat(t) {
  return cs * t;
}

function rComov(t) {
  let r = 0;
  const dt = 0.5;
  for (let ti = 0; ti < t; ti += dt) {
    const ai = a(ti + dt/2);
    r += cs * dt / ai;
  }
  return r;
}

function drawStatic(t) {
  const canvas = document.getElementById('flatCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.fillStyle = dark ? '#12121e' : '#f4f2ee';
  ctx.fillRect(0, 0, W, H);

  const nMarks = 13;
  const spacing = W / (nMarks + 1);
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.8;
  for (let i = 1; i <= nMarks; i++) {
    const x = i * spacing;
    ctx.beginPath(); ctx.moveTo(x, 20); ctx.lineTo(x, H - 20); ctx.stroke();
  }

  const cx = W / 2;
  const cy = H / 2;
  const scale = 1.5;
  const r = rFlat(t) * scale;

  if (r > 2) {
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.min(r, W * 0.9), 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = '#E24B4A';
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = dark ? '#85B7EB' : '#185FA5';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('r = c_s · t = ' + rFlat(t).toFixed(1), 10, H - 8);
}

function drawExpand(t) {
  const canvas = document.getElementById('expandCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.fillStyle = dark ? '#12121e' : '#f4f2ee';
  ctx.fillRect(0, 0, W, H);

  const at = a(t);
  const nMarks = 13;
  const baseSpacing = W / (nMarks + 1);
  const stretched = baseSpacing * at;

  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.8;
  const cx0 = W / 2;
  for (let i = -6; i <= 6; i++) {
    const x = cx0 + i * stretched;
    if (x > 0 && x < W) {
      ctx.beginPath(); ctx.moveTo(x, 20); ctx.lineTo(x, H - 20); ctx.stroke();
    }
  }

  const cy = H / 2;
  const rc = rComov(t);
  const rPhys = rc * at;
  const scale = 1.5;
  const drawR = rPhys * scale;

  if (drawR > 2) {
    ctx.strokeStyle = '#EF9F27';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx0, cy, Math.min(drawR, W * 0.9), 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = dark ? 'rgba(239,159,39,0.25)' : 'rgba(239,159,39,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(cx0, cy, Math.min(rc * scale, W * 0.9), 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.fillStyle = '#E24B4A';
  ctx.beginPath(); ctx.arc(cx0, cy, 5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = dark ? '#FAC775' : '#854F0B';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('r_comov = ' + rc.toFixed(1) + '  r_phys = ' + rPhys.toFixed(1), 6, H - 8);

  ctx.fillStyle = dark ? 'rgba(239,159,39,0.5)' : 'rgba(186,117,23,0.5)';
  ctx.font = '10px system-ui';
  ctx.fillText('пунктир = коморбідне', 6, H - 20);
}

function drawGraph(t) {
  const canvas = document.getElementById('graphCanvas');
  canvas.width = GW; canvas.height = GH;
  const ctx = canvas.getContext('2d');
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.fillStyle = dark ? '#12121e' : '#f4f2ee';
  ctx.fillRect(0, 0, GW, GH);

  const padL = 46, padR = 20, padT = 16, padB = 36;
  const gW = GW - padL - padR, gH = GH - padT - padB;

  const tMax = 100;
  const rMax = 160;

  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padT + gH * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL+gW, y); ctx.stroke();
  }

  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(padL, padT, gW, gH);

  function toX(t) { return padL + gW * t / tMax; }
  function toY(r) { return padT + gH * (1 - Math.min(r, rMax) / rMax); }

  ctx.strokeStyle = '#378ADD';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let ti = 0; ti <= tMax; ti += 1) {
    const r = rFlat(ti);
    ti === 0 ? ctx.moveTo(toX(ti), toY(r)) : ctx.lineTo(toX(ti), toY(r));
  }
  ctx.stroke();

  ctx.strokeStyle = '#EF9F27';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let ti = 0; ti <= tMax; ti += 2) {
    const r = rComov(ti);
    ti === 0 ? ctx.moveTo(toX(ti), toY(r)) : ctx.lineTo(toX(ti), toY(r));
  }
  ctx.stroke();

  const tx = toX(t);
  ctx.strokeStyle = dark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(tx, padT); ctx.lineTo(tx, padT+gH); ctx.stroke();
  ctx.setLineDash([]);

  const rf = rFlat(t);
  const rc = rComov(t);
  ctx.fillStyle = '#378ADD';
  ctx.beginPath(); ctx.arc(tx, toY(rf), 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#EF9F27';
  ctx.beginPath(); ctx.arc(tx, toY(rc), 4, 0, Math.PI*2); ctx.fill();

  const textColor = dark ? '#c2c0b6' : '#3d3d3a';
  ctx.fillStyle = '#888';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    ctx.fillText(Math.round(i/5*tMax), toX(i/5*tMax), padT+gH+16);
  }
  ctx.fillText('час t', padL + gW/2, padT+gH+30);
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    ctx.fillText(Math.round(i/4*rMax), padL-4, toY(i/4*rMax)+4);
  }

  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#378ADD';
  ctx.fillText('статика: r = c_s·t', padL+8, padT+14);
  ctx.fillStyle = '#EF9F27';
  ctx.fillText('розширення: r_comov = ∫c_s dt/a(t)', padL+8, padT+28);
}

function draw() {
  const t = +document.getElementById('tSlider').value;
  document.getElementById('tVal').textContent = t;
  drawStatic(t);
  drawExpand(t);
  drawGraph(t);
}

document.getElementById('tSlider').addEventListener('input', draw);
draw();
</script>
